dataset:
  name: cctsdb_yolo
  root: /path/to/CCTSDB
  image_dir: images
  label_dir: labels
  train_split: train
  val_split: test
  adv_split: test_fgsm_v9
  skip_empty: true
  classes:
    - mandatory
    - prohibitory
    - warning
  class_aliases: {}

model:
  weights: DEFAULT
  trainable_backbone_layers: 3
  min_size: 800
  max_size: 1333

train:
  epochs: 20
  batch_size: 2
  num_workers: 4
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_step_size: 8
  lr_gamma: 0.1
  print_freq: 50
  output_dir: outputs/cctsdb_fasterrcnn
  seed: 42
  resume: null
