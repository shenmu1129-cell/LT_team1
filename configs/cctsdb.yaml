dataset:
  name: cctsdb
  root: /path/to/CCTSDB
  image_dir: images
  annotation_dir: annotations
  train_split_file: null
  val_split_file: null
  val_ratio: 0.2
  classes: null
  class_aliases:
    Mandatory: mandatory
    Prohibitory: prohibitory
    Warning: warning
    mandatory: mandatory
    prohibitory: prohibitory
    warning: warning

model:
  weights: DEFAULT
  trainable_backbone_layers: 3
  min_size: 800
  max_size: 1333

train:
  epochs: 20
  batch_size: 2
  num_workers: 4
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_step_size: 8
  lr_gamma: 0.1
  print_freq: 50
  output_dir: outputs/cctsdb_fasterrcnn
  seed: 42
  resume: null
